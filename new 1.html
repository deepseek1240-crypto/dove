<!DOCTYPE html>
<html>
<head>
<style>
body {
  background: #eee;
  font-family: Arial, sans-serif;
}

.banner {
  background: linear-gradient(135deg, #5a1a1a, #ff7a00);
  color: white;
  padding: 40px;
  border-radius: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.content h2 {
  margin: 0;
  font-size: 28px;
}

.content p {
  font-size: 14px;
  opacity: 0.8;
}

.search-box {
  display: flex;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

.search-box input {
  border: none;
  padding: 10px;
  outline: none;
}

.search-box button {
  background: black;
  color: white;
  border: none;
  padding: 10px 15px;
  cursor: pointer;
}


</style>
</head>
<body>
div class="banner">
  <div class="content">
    <h2>Travel without limit</h2>
    <p>Find your dream place for your trip with amazing destination</p>
  </div>

  <div class="search-box">
    <input type="text" placeholder="Your destination">
    <button>🔍</button>
  </div>
</div>
</body>
</html>
