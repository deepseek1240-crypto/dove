<!DOCTYPE html>
	<html>
		<head>
			<title>HTML Form</title>
		
		
		</head>
		<body>
			<h2>Registration Form</h2>
			<form>
			<label>First Name:</label>
			
			<input type="text" placeholder="First Name">
			<br>
			<label>Last Name:</label>
			
			<input type="text" placeholder="Last Name">
			<br>
			<label >Email:</label>
			
			<input type="Email" placeholder="Email">
			<br>
			<label>Password:</label>
			
			<input type="Password" placeholder="">
			<br>
			
			<h4>Gender:</h4>
			
			<label>Male</label>
			<input name="Gender" type="radio" value="male">
			<br>
			<label>Female</label>
			<input name="Gender" type="radio" value="Female">
			<br>
			
			<label>Other</label>
			<input name="Gender" type="radio" value="Other">
			<br>
			
			<label>Age:</label>
			
			<input type="number" max="60" min="18" placeholder="">
			<br>
			
			<h4>Preferences:</h4>
			<label>Acrulic Painting</label>
			<input type="Checkbox" value="Acrulic Painting">
			<br>
			<label>Oil Painting</label>
			<input type="Checkbox" value="Oil Painting">
			<br>
			<label>Water color Painting</label>
			<input type="Checkbox" value="Water color Painting">
			<br>
			
			<label>Select Occupation</label>
			<Select>
			<option>Student</option>
			<hr>
			<option>Greduate</option>
			<option>Businessman</option>
			<option>Employe</option>
			<option>Doctor</option>
			</Select><br>
			
			<label>Bio</label>
			<textarea rows="10" cols="50" placeholder="Share few lines about yourself"></textarea>
			<br>
			<input type="reset" value="Reset">
			<input type="submit" value="Submit">
			</form>
		
		
		</body>
	
	
	</html>
